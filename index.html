<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herbst-Hausservice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(98,141,50,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34,51,68,0.15), transparent 30%),
        #f6f8f5;
      color: #223344;
      position: relative;
    }

    .background-blur {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: rgba(98,141,50,0.12);
      filter: blur(120px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 1100px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 32px;
      padding: 80px 60px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 40px;
    }

    h1 {
      font-size: 68px;
      line-height: 1;
      margin-bottom: 24px;
      font-weight: 800;
      color: #223344;
    }

    h1 span {
      color: #628D32;
    }

    p {
      font-size: 22px;
      line-height: 1.7;
      max-width: 760px;
      margin: auto;
      color: #556270;
    }

    .status {
      margin-top: 42px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(98,141,50,0.12);
      color: #628D32;
      padding: 16px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 18px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #628D32;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .footer {
      margin-top: 50px;
      color: #7b8794;
      font-size: 15px;
    }

    @media(max-width: 768px) {
      .container {
        padding: 50px 28px;
      }

      h1 {
        font-size: 42px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>
